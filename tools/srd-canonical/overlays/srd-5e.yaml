# ===================================================================
# Entity-level effect authoring (effects-application engine, 2026-06-10).
# Keyed by bare optional-feature slug. Only Defense is authored -- the other
# fighting styles need per-attack vocabulary (named deferral in the spec).
# ===================================================================
optional_features:
  defense:
    effects:
      - { kind: ac-bonus, value: 1, requires_armor: true }

# ===================================================================
# Background decision data (SP2 Plan 3). Keyed by bare background slug. SRD 5.1
# ships exactly ONE background -- Acolyte -- which was walked. 2014 backgrounds
# grant no ability-score increase (that's a 2024 addition); Acolyte's skills
# (Insight, Religion) and tool proficiencies are fixed. Its only player choice
# is "two languages of your choice" (the runtime language_proficiencies carries
# {kind: choice, count: 2, from: any}).
# ===================================================================
backgrounds:
  acolyte:
    # 2014 Acolyte fixed gear: a holy symbol, a prayer book or prayer wheel,
    # 5 sticks of incense, vestments, common clothes, and a pouch with 15 gp.
    # None of these mundane items ship as base items in the 2014 runtime data,
    # so the gear is label-only and only the 15 gp is granted.
    equipment:
      - kind: fixed
        label: "A Holy Symbol, a Prayer Book, 5 Sticks of Incense, Vestments, Common Clothes, and a Pouch (15 GP)"
        grants: [{ gold: 15 }]
    choices:
      - kind: select-proficiency
        id: languages
        domain: language
        count: 2
