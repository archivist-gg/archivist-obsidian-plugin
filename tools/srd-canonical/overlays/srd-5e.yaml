            grants: [{ category: martial-weapon }]
      - kind: choice
        options:
          - label: "Two Handaxes"
            grants: [{ item: handaxe, qty: 2 }]
          - label: "Any simple weapon"
            grants: [{ category: simple-weapon }]
      # An explorer's pack (no base item in 2014 runtime data -> label-only).
      - kind: fixed
