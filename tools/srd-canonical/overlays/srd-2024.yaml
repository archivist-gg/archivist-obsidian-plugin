race_traits:
  # Dragonborn (2024) -- Breath Weapon: uses = Proficiency Bonus, regain on a
  # long rest. (This differs from 2014's 1/short-rest; the prior seed was wrong.)
  breath-weapon:
    action_cost: action
    resources:
      - id: "dragonborn:breath-weapon"
        name: Breath Weapon
        max_formula: "prof"
        reset: long-rest
    save:
      ability: dex
      dc_formula: "8 + {con_mod} + {prof_bonus}"
  # Dwarf (2024) -- Stonecunning: Tremorsense, PB uses / long rest.
  stonecunning:
    action_cost: bonus-action
    resources:
      - id: "dwarf:stonecunning"
        name: Stonecunning
        max_formula: "prof"
        reset: long-rest
  # Goliath (2024) -- Giant Ancestry boon, PB uses / long rest. The boon itself
  # is a build-time pick of one of six giant ancestries (effects are situational
  # combat riders not expressible as FeatureEffects, so descriptions only).
  giant-ancestry:
    resources:
      - id: "goliath:giant-ancestry"
        name: Giant Ancestry
        max_formula: "prof"
        reset: long-rest
    choices:
      - kind: select-inline
        id: giant-ancestry
        count: 1
        options:
          - value: clouds-jaunt
            label: Cloud's Jaunt (Cloud Giant)
            description: As a Bonus Action, you magically teleport up to 30 feet to an unoccupied space you can see.
          - value: fires-burn
            label: Fire's Burn (Fire Giant)
            description: When you hit a target with an attack roll and deal damage to it, you can also deal 1d10 Fire damage to that target.
          - value: frosts-chill
            label: Frost's Chill (Frost Giant)
            description: When you hit a target with an attack roll and deal damage to it, you can also deal 1d6 Cold damage and reduce its Speed by 10 feet until the start of your next turn.
          - value: hills-tumble
            label: Hill's Tumble (Hill Giant)
            description: When you hit a Large or smaller creature with an attack roll and deal damage to it, you can give that target the Prone condition.
          - value: stones-endurance
            label: Stone's Endurance (Stone Giant)
            description: When you take damage, you can take a Reaction to roll 1d12, add your Constitution modifier, and reduce the damage by that total.
          - value: storms-thunder
            label: Storm's Thunder (Storm Giant)
            description: When you take damage from a creature within 60 feet of you, you can take a Reaction to deal 1d8 Thunder damage to that creature.
  # Orc (2024) -- Adrenaline Rush, PB uses / short or long rest.
  adrenaline-rush:
    action_cost: bonus-action
    resources:
      - id: "orc:adrenaline-rush"
        name: Adrenaline Rush
        max_formula: "prof"
        reset: short-rest

  # ===================================================================
  # Species trait decision data (SP2 Plan 3). race_traits keys are BARE
  # trait-slugs (slugifyName(trait.name)), NOT owner-scoped. Every 2024 species
  # was walked; only the traits below carry a build-time choice. Lineage traits
  # (Elf/Gnome/Tiefling) also let you pick Int/Wis/Cha as the spellcasting
  # ability for the lineage's spells; that sub-pick is authored as a sibling
  # select-inline choice on each lineage trait below.
  # ===================================================================

  # --- Dragonborn -- Draconic Ancestry: pick a dragon kind; the Damage
  # Resistance trait grants Resistance to the linked damage type, so each option
  # carries that resistance effect. (Breath Weapon damage type is the same.)
  draconic-ancestry:
    choices:
      - kind: select-inline
        id: draconic-ancestry
        count: 1
        options:
          - value: black
            label: Black (Acid)
            effects: [{ kind: resistance, damage_type: Acid }]
          - value: blue
            label: Blue (Lightning)
            effects: [{ kind: resistance, damage_type: Lightning }]
          - value: brass
            label: Brass (Fire)
            effects: [{ kind: resistance, damage_type: Fire }]
          - value: bronze
            label: Bronze (Lightning)
            effects: [{ kind: resistance, damage_type: Lightning }]
          - value: copper
            label: Copper (Acid)
            effects: [{ kind: resistance, damage_type: Acid }]
          - value: gold
            label: Gold (Fire)
            effects: [{ kind: resistance, damage_type: Fire }]
          - value: green
            label: Green (Poison)
            effects: [{ kind: resistance, damage_type: Poison }]
          - value: red
            label: Red (Fire)
            effects: [{ kind: resistance, damage_type: Fire }]
          - value: silver
            label: Silver (Cold)
            effects: [{ kind: resistance, damage_type: Cold }]
          - value: white
            label: White (Cold)
            effects: [{ kind: resistance, damage_type: Cold }]

  # --- Elf -- Elven Lineage: pick Drow / High Elf / Wood Elf (level-1 benefit;
  # higher-level always-prepared spells are spell mgmt, SP4c). ---
  elven-lineage:
    choices:
      - kind: select-inline
        id: elven-lineage
        count: 1
        options:
          - value: drow
            label: Drow
            description: The range of your Darkvision increases to 120 feet, and you know the Dancing Lights cantrip.
          - value: high-elf
            label: High Elf
            description: You know the Prestidigitation cantrip; on a Long Rest you can swap it for a different Wizard cantrip.
          - value: wood-elf
            label: Wood Elf
            description: Your Speed increases to 35 feet, and you know the Druidcraft cantrip.
      # Int/Wis/Cha is your spellcasting ability for this lineage's spells (picked when you select the lineage).
      - kind: select-inline
        id: spellcasting-ability
        count: 1
        options:
          - value: int
            label: Intelligence
          - value: wis
            label: Wisdom
          - value: cha
            label: Charisma

  # --- Elf -- Keen Senses: proficiency in Insight, Perception, or Survival. ---
  keen-senses:
    choices:
      - kind: select-proficiency
        id: skill
        domain: skill
        count: 1
        from: [insight, perception, survival]

  # --- Gnome -- Gnomish Lineage: pick Forest Gnome or Rock Gnome. ---
  gnomish-lineage:
    choices:
      - kind: select-inline
        id: gnomish-lineage
        count: 1
        options:
          - value: forest-gnome
            label: Forest Gnome
            description: You know the Minor Illusion cantrip and always have Speak with Animals prepared (PB casts without a slot per Long Rest).
          - value: rock-gnome
            label: Rock Gnome
            description: You know the Mending and Prestidigitation cantrips and can build a Tiny clockwork device (AC 5, 1 HP).
      # Int/Wis/Cha is your spellcasting ability for this lineage's spells (picked when you select the lineage).
      - kind: select-inline
        id: spellcasting-ability
        count: 1
        options:
          - value: int
            label: Intelligence
          - value: wis
            label: Wisdom
          - value: cha
            label: Charisma

  # --- Human -- Skillful: proficiency in one skill of your choice. ---
  skillful:
    choices:
      - kind: select-proficiency
        id: skill
        domain: skill
        count: 1
  # --- Human -- Versatile: an Origin feat of your choice. ---
  versatile:
    choices:
      - kind: select-entity
        id: origin-feat
        count: 1
        entity_type: feat
        where: { category: origin }

  # --- Tiefling -- Fiendish Legacy: pick Abyssal / Chthonic / Infernal; each
  # grants a fixed Resistance at level 1, so options carry that effect. ---
  fiendish-legacy:
    choices:
      - kind: select-inline
        id: fiendish-legacy
        count: 1
        options:
          - value: abyssal
            label: Abyssal
            description: You know the Poison Spray cantrip.
            effects: [{ kind: resistance, damage_type: Poison }]
          - value: chthonic
            label: Chthonic
            description: You know the Chill Touch cantrip.
            effects: [{ kind: resistance, damage_type: Necrotic }]
          - value: infernal
            label: Infernal
            description: You know the Fire Bolt cantrip.
            effects: [{ kind: resistance, damage_type: Fire }]
      # Int/Wis/Cha is your spellcasting ability for this legacy's spells (picked when you select the legacy).
      - kind: select-inline
        id: spellcasting-ability
        count: 1
        options:
          - value: int
            label: Intelligence
          - value: wis
            label: Wisdom
          - value: cha
            label: Charisma

# ===================================================================
# Entity-level species choices (SP2 Plan 3). Keyed by bare species slug. Used
# for decisions not attached to a single named trait. Every 2024 species was
# walked; none has a species-level (non-trait) build choice -- ability scores
# come from the background, languages from background/creation -- so this
# section is intentionally empty and omitted. (Per-trait choices live above.)
# ===================================================================

# ===================================================================
# Feat decision data (SP2 Plan 3). feat_features keys are BARE feat slugs
# (feat-merge looks up slugifyName(feat.name)); authored `choices` land on the
# feat entity itself. Every 2024 feat in feat.2024.json was walked; feats not
# keyed here have fixed benefits only (no decision prose).
# ===================================================================
feat_features:
  # Ability Score Improvement: "Increase one ability score of your choice by
  # 2, or increase two ability scores of your choice by 1" -- the classic
  # +2 / +1+1 point spend. (The "can't exceed 20" cap is a rules cap, not part
  # of the choice shape.)
  ability-score-improvement:
    choices: [{ kind: ability-points, id: asi, points: 2, max_per: 2 }]
  # Epic Boons: each grants "Increase one ability score of your choice by 1,
  # to a maximum of 30" plus fixed benefits -- a single-point spend (the 30
  # cap is a rules cap, not part of the choice shape).
  boon-of-combat-prowess:
    choices: [{ kind: ability-points, id: asi, points: 1, max_per: 1 }]
  boon-of-dimensional-travel:
    choices: [{ kind: ability-points, id: asi, points: 1, max_per: 1 }]
  boon-of-fate:
    choices: [{ kind: ability-points, id: asi, points: 1, max_per: 1 }]
  boon-of-irresistible-offense:
    choices: [{ kind: ability-points, id: asi, points: 1, max_per: 1 }]
  boon-of-spell-recall:
    choices: [{ kind: ability-points, id: asi, points: 1, max_per: 1 }]
  boon-of-the-night-spirit:
    choices: [{ kind: ability-points, id: asi, points: 1, max_per: 1 }]
  boon-of-the-truesight:
    choices: [{ kind: ability-points, id: asi, points: 1, max_per: 1 }]
  # Grappler: "Increase your Strength or Dexterity score by 1" -- a real
  # 1-point spend from a 2-ability pool (the coverage regexes can't see this
  # phrasing, but the decision is authored anyway).
  grappler:
    choices: [{ kind: ability-points, id: asi, points: 1, max_per: 1, pool: [str, dex] }]
  # Magic Initiate: "two cantrips of your choice from the Cleric, Druid, or
  # Wizard spell list. Intelligence, Wisdom, or Charisma is your spellcasting
  # ability for this feat's spells (choose when you select this feat)."
  magic-initiate:
    # cantrip/level-1-spell selection deferred: spell management lives on the sheet (SP4c)
    choices:
      - kind: select-inline
        id: spell-list
        count: 1
        options:
          - value: cleric
            label: Cleric
          - value: druid
            label: Druid
          - value: wizard
            label: Wizard
      - kind: select-inline
        id: spellcasting-ability
        count: 1
        options:
          - value: int
            label: Intelligence
          - value: wis
            label: Wisdom
          - value: cha
            label: Charisma
  # Skilled: "proficiency in any combination of three skills or tools of your
  # choice." One select-proficiency cannot span two domains (skill + tool), so
  # the combination is encoded as a count-1 select-inline over the four
  # skill/tool splits, each option nesting domain-true select-proficiency
  # picks.
  skilled:
    choices:
      - kind: select-inline
        id: skills-or-tools
        count: 1
        options:
          - value: three-skills
            label: Three skills
            choices:
              - { kind: select-proficiency, id: skills, domain: skill, count: 3 }
          - value: two-skills-one-tool
            label: Two skills and one tool
            choices:
              - { kind: select-proficiency, id: skills, domain: skill, count: 2 }
              - { kind: select-proficiency, id: tools, domain: tool, count: 1 }
          - value: one-skill-two-tools
            label: One skill and two tools
            choices:
              - { kind: select-proficiency, id: skills, domain: skill, count: 1 }
              - { kind: select-proficiency, id: tools, domain: tool, count: 2 }
          - value: three-tools
            label: Three tools
            choices:
              - { kind: select-proficiency, id: tools, domain: tool, count: 3 }

optional_feature_slugs:
  invocation:
    - agonizing-blast
  fighting_style:
    - defense
    - dueling

# ===================================================================
# Background decision data (SP2 Plan 3). Keyed by bare background slug. Every
# 2024 background grants 2 FIXED skills + 1 origin feat (FIXED per background)
# + an ability-score allocation over a fixed pool of three abilities (+2/+1 or
# +1/+1/+1) -- the ability-points primitive expresses both patterns (points: 3,
# max_per: 2). Skills/feat carry no choice, so they are not authored. Tool
# proficiency is fixed except Soldier (a Gaming Set pick). All four 2024
# backgrounds were walked.
# ===================================================================
backgrounds:
  acolyte:
    equipment:
      - kind: choice
        options:
          - label: "Calligrapher's Supplies, Book (Prayers), Holy Symbol, 10 sheets Parchment, Robe, and 8 GP"
            grants: [{ gold: 8 }]
          - label: "50 GP"
            grants: [{ gold: 50 }]
    choices:
      - kind: ability-points
        id: abilities
        points: 3
        max_per: 2
        pool: [int, wis, cha]
  criminal:
    equipment:
      - kind: choice
        options:
          - label: "2 Daggers, Thieves' Tools, Crowbar, 2 Pouches, Traveler's Clothes, and 16 GP"
            grants:
              - { item: dagger, qty: 2 }
              - { gold: 16 }
          - label: "50 GP"
            grants: [{ gold: 50 }]
    choices:
      - kind: ability-points
        id: abilities
        points: 3
        max_per: 2
        pool: [dex, con, int]
  sage:
    equipment:
      - kind: choice
        options:
          - label: "Quarterstaff, Calligrapher's Supplies, Book (History), 8 sheets Parchment, Robe, and 8 GP"
            grants:
              - { item: quarterstaff }
              - { gold: 8 }
          - label: "50 GP"
            grants: [{ gold: 50 }]
    choices:
      - kind: ability-points
        id: abilities
        points: 3
        max_per: 2
        pool: [con, int, wis]
  soldier:
    equipment:
      - kind: choice
        options:
          - label: "Spear, Shortbow, 20 Arrows, Gaming Set (Dice Set), Healer's Kit, Quiver, Traveler's Clothes, and 14 GP"
            grants:
              - { item: spear }
              - { item: shortbow }
              - { gold: 14 }
          - label: "50 GP"
            grants: [{ gold: 50 }]
    choices:
      - kind: ability-points
        id: abilities
        points: 3
        max_per: 2
        pool: [str, dex, con]
      # Soldier's tool proficiency is a Gaming Set of your choice (the specific
      # gaming-set tool list isn't enumerated in the runtime data, so this is an
      # open tool pick of count 1).
      - kind: select-proficiency
        id: tool
        domain: tool
        count: 1

# ===================================================================
# Entity-level effect authoring (effects-application engine, 2026-06-10).
# 2024 fighting styles are FEATS -- keyed by bare feat slug.
# ===================================================================
feats:
  defense:
    effects:
      - { kind: ac-bonus, value: 1, requires_armor: true }
