# SRD 5.2 overlay -- limited-use resources + action economy + OptionalFeature SRD slugs.
# Mostly aligned with srd-5e.yaml; SRD 2024 has tighter upstream structure.
# Source: WotC SRD 5.2 PDF.
# Per-feature `resources[]` carry structured limited-use pools (SP4d Phase 1).

class_features:
  # Fighter (2024 -- Action Surge unchanged)
  action-surge:
    action_cost: special
    resources:
      - id: "fighter:action-surge"
        name: Action Surge
        max_formula: "1"
        scales_at: [{ level: 17, max: "2" }]
        reset: short-rest
  second-wind:
    action_cost: bonus-action
    resources:
      - id: "fighter:second-wind"
        name: Second Wind
        max_formula: "2"
        scales_at: [{ level: 10, max: "3" }, { level: 17, max: "4" }]
        reset: short-rest
    healing: { dice: "1d10", bonus: "{level}" }
  # Barbarian (2024 -- Rage uses 2/3/4/5/6; no level-20 "unlimited" entry)
  rage:
    action_cost: bonus-action
    resources:
      - id: "barbarian:rage"
        name: Rage
        max_formula: "2"
        scales_at: [{ level: 3, max: "3" }, { level: 6, max: "4" }, { level: 12, max: "5" }, { level: 17, max: "6" }]
        reset: long-rest
  # Persistent Rage (L15) -- 1/long-rest recovery of expended Rage uses.
  persistent-rage:
    action_cost: special
    resources:
      - id: "barbarian:persistent-rage"
        name: Persistent Rage
        max_formula: "1"
        reset: long-rest
  # Bard (2024 -- Bardic Inspiration; die scales d6/d8/d10/d12)
  bardic-inspiration:
    action_cost: bonus-action
    resources:
      - id: "bard:bardic-inspiration"
        name: Bardic Inspiration
        max_formula: "{cha_mod}"
        die: { base: d6, scaling: { 5: d8, 10: d10, 15: d12 } }
        reset: short-rest
  # Channel Divinity -- SHARED base pool. Feature-slug keying means this single
  # entry lands on BOTH Cleric and Paladin (and their subclass CD options), which
  # share a base of 2 uses in 2024. Per-class high-level scaling (Cleric 3@6/4@18,
  # Paladin 3@11) cannot be expressed with one key, so scaling is omitted here.
  channel-divinity:
    action_cost: action
    noChoices: true # per-use effect pick (e.g. Divine Spark vs Turn Undead), resolved in play, not a build decision
    resources:
      - id: "channel-divinity"
        name: Channel Divinity
        max_formula: "2"
        reset: short-rest
  # Druid (2024 -- Wild Shape 2/3/4 at 2/6/17)
  wild-shape:
    action_cost: bonus-action
    resources:
      - id: "druid:wild-shape"
        name: Wild Shape
        max_formula: "2"
        scales_at: [{ level: 6, max: "3" }, { level: 17, max: "4" }]
        reset: short-rest
  # Monk (2024 -- Monk's Focus / Focus Points = Monk level)
  monks-focus:
    resources:
      - id: "monk:focus-points"
        name: Focus Points
        max_formula: "class_level"
        reset: short-rest
  # Uncanny Metabolism (L2) -- 1/long-rest recovery of Focus Points.
  uncanny-metabolism:
    resources:
      - id: "monk:uncanny-metabolism"
        name: Uncanny Metabolism
        max_formula: "1"
        reset: long-rest
  # Ranger (2024 -- Favored Enemy = free Hunter's Mark casts; 2/3/4/5/6)
  favored-enemy:
    resources:
      - id: "ranger:favored-enemy"
        name: Favored Enemy
        max_formula: "2"
        scales_at: [{ level: 5, max: "3" }, { level: 9, max: "4" }, { level: 13, max: "5" }, { level: 17, max: "6" }]
        reset: long-rest
  tireless:
    action_cost: action
    resources:
      - id: "ranger:tireless"
        name: Tireless
        max_formula: "{wis_mod}"
        reset: long-rest
  natures-veil:
    action_cost: bonus-action
    resources:
      - id: "ranger:natures-veil"
        name: Nature's Veil
        max_formula: "{wis_mod}"
        reset: long-rest
  # Sorcerer (2024)
  innate-sorcery:
    action_cost: bonus-action
    resources:
      - id: "sorcerer:innate-sorcery"
        name: Innate Sorcery
        max_formula: "2"
        reset: long-rest
  font-of-magic:
    resources:
      - id: "sorcerer:sorcery-points"
        name: Sorcery Points
        max_formula: "class_level"
        reset: long-rest
  # Sorcerous Restoration (L20) -- 1/long-rest recovery of Sorcery Points.
  sorcerous-restoration:
    resources:
      - id: "sorcerer:sorcerous-restoration"
        name: Sorcerous Restoration
        max_formula: "1"
        reset: long-rest
  # Warlock -- Magical Cunning: 1/long-rest recovery of Pact Magic slots.
  magic-cunning:
    action_cost: special
    resources:
      - id: "warlock:magic-cunning"
        name: Magical Cunning
        max_formula: "1"
        reset: long-rest

  # ===================================================================
  # Decision data (SP2 Plan 3) -- player choices carried as `choices`.
  # Four primitives: select-inline / select-entity / select-proficiency /
  # ability-points (recursive nesting via option `choices`). `id` values are
  # permanent persistence keys. Bare keys apply to every class with that
  # feature slug; scoped `<class-bare-slug>:<feature-slug>` keys are
  # class-specific and win over bare keys.
  # ===================================================================

  # Ability Score Improvement (shared) -- 2024 ASI is a feat grant: the
  # Ability Score Improvement feat (+2 / +1+1) OR another feat of your choice.
  # Represented as the agreed asi-or-feat select-inline.
  ability-score-improvement:
    choices:
      - kind: select-inline
        id: asi-or-feat
        count: 1
        options:
          - value: asi
            label: Ability Score Increase
            choices: [{ kind: ability-points, id: asi, points: 2, max_per: 2 }]
          - value: feat
            label: Feat
            choices: [{ kind: select-entity, id: feat, entity_type: feat, count: 1 }]
  # Epic Boon (shared, L19) -- an Epic Boon feat or another feat of your
  # choice. No epic-boon feat category exists in SRD feat data, so this is an
  # open feat pick (the "another feat of your choice" clause).
  epic-boon:
    choices:
      - kind: select-entity
        id: epic-boon
        count: 1
        entity_type: feat

  # --- Subclass selection (scoped; one per class) ---
  barbarian:barbarian-subclass:
    choices: [{ kind: select-entity, id: subclass, count: 1, entity_type: subclass, where: { parent_class: self } }]
  bard:bard-subclass:
    choices: [{ kind: select-entity, id: subclass, count: 1, entity_type: subclass, where: { parent_class: self } }]
  cleric:cleric-subclasses:
    choices: [{ kind: select-entity, id: subclass, count: 1, entity_type: subclass, where: { parent_class: self } }]
  druid:druid-subclass:
    choices: [{ kind: select-entity, id: subclass, count: 1, entity_type: subclass, where: { parent_class: self } }]
  fighter:fighter-subclass:
    choices: [{ kind: select-entity, id: subclass, count: 1, entity_type: subclass, where: { parent_class: self } }]
  monk:monk-subclass:
    choices: [{ kind: select-entity, id: subclass, count: 1, entity_type: subclass, where: { parent_class: self } }]
  paladin:paladin-subclass:
    choices: [{ kind: select-entity, id: subclass, count: 1, entity_type: subclass, where: { parent_class: self } }]
  ranger:ranger-subclass:
    choices: [{ kind: select-entity, id: subclass, count: 1, entity_type: subclass, where: { parent_class: self } }]
  rogue:rogue-subclass:
    choices: [{ kind: select-entity, id: subclass, count: 1, entity_type: subclass, where: { parent_class: self } }]
  sorcerer:sorcerer-subclass:
    choices: [{ kind: select-entity, id: subclass, count: 1, entity_type: subclass, where: { parent_class: self } }]
  warlock:warlock-subclass:
    choices: [{ kind: select-entity, id: subclass, count: 1, entity_type: subclass, where: { parent_class: self } }]
  wizard:wizard-subclass:
    choices: [{ kind: select-entity, id: subclass, count: 1, entity_type: subclass, where: { parent_class: self } }]
  # NOTE: Bard's L3 "Bard Subclass" feature carries an empty gained_at in the
  # base data (unlike every sibling class), so the class merger backfills its
  # level from subclass_level (3). The scoped key above attaches the standard
  # subclass select-entity choice once the feature is bucketed.

  # --- Fighting Style (scoped; fighter L1 / paladin L2 / ranger L2) ---
  # A Fighting Style optional feature of your choice. (Paladin/Ranger also
  # offer the Blessed/Druidic Warrior cantrip alternative -- deferred.)
  fighter:fighting-style:
    choices:
      - kind: select-entity
        id: fighting-style
        count: 1
        entity_type: optional-feature
        where: { feature_type: fighting_style, available_to: self }
  paladin:fighting-style:
    choices:
      - kind: select-entity
        id: fighting-style
        count: 1
        entity_type: optional-feature
        where: { feature_type: fighting_style, available_to: self }
  ranger:fighting-style:
    choices:
      - kind: select-entity
        id: fighting-style
        count: 1
        entity_type: optional-feature
        where: { feature_type: fighting_style, available_to: self }

  # --- Expertise (scoped) ---
  # Rogue: L1 picks 2, L6 picks 2 more (same scoped key covers both entries).
  rogue:expertise:
    choices: [{ kind: select-proficiency, id: expertise, domain: skill, count: 2, from_proficient: true, expertise: true }]
  # Bard: L2 picks 2, L9 picks 2 more (one entry in runtime; key covers all).
  bard:expertise:
    choices: [{ kind: select-proficiency, id: expertise, domain: skill, count: 2, from_proficient: true, expertise: true }]
  # Ranger L9: choose two skills you lack Expertise in.
  ranger:expertise:
    choices: [{ kind: select-proficiency, id: expertise, domain: skill, count: 2, from_proficient: true, expertise: true }]

  # --- Ranger Deft Explorer (L2): Expertise (1 skill) + 2 languages ---
  ranger:deft-explorer:
    choices:
      - kind: select-proficiency
        id: expertise
        domain: skill
        count: 1
        from_proficient: true
        expertise: true
      - kind: select-proficiency
        id: languages
        domain: language
        count: 2

  # --- Wizard Scholar (L2): Expertise in one listed skill you're proficient in ---
  wizard:scholar:
    choices:
      - kind: select-proficiency
        id: expertise
        domain: skill
        count: 1
        from: [arcana, history, investigation, medicine, nature, religion]
        from_proficient: true
        expertise: true

  # --- Barbarian Primal Knowledge (L3): one more skill from the Barbarian list ---
  barbarian:primal-knowledge:
    choices:
      - kind: select-proficiency
        id: skill
        domain: skill
        count: 1
        from: [animal-handling, athletics, intimidation, nature, perception, survival]

  # --- Weapon Mastery (scoped; all five classes grant it at L1) ---
  # "use the mastery properties of N kinds of ... weapons of your choice."
  # Re-pickable after a Long Rest, but the initial pick is a build decision
  # (same treatment as Hunter's Prey below). The WHERE vocabulary cannot
  # express the per-class weapon restrictions (Barbarian: Simple/Martial
  # MELEE only; Paladin/Ranger/Rogue: weapons you're proficient with), so the
  # pick is an open weapon select and the restriction stays in the feature
  # prose. Higher-level count increases (Weapon Mastery column) ride later
  # levels and are deferred (the runtime feature row exists only at the grant
  # level).
  barbarian:weapon-mastery:
    choices: [{ kind: select-entity, id: weapon-mastery, count: 2, entity_type: weapon }]
  fighter:weapon-mastery:
    choices: [{ kind: select-entity, id: weapon-mastery, count: 3, entity_type: weapon }]
  paladin:weapon-mastery:
    choices: [{ kind: select-entity, id: weapon-mastery, count: 2, entity_type: weapon }]
  ranger:weapon-mastery:
    choices: [{ kind: select-entity, id: weapon-mastery, count: 2, entity_type: weapon }]
  rogue:weapon-mastery:
    choices: [{ kind: select-entity, id: weapon-mastery, count: 2, entity_type: weapon }]

  # --- Rogue Thieves' Cant (L1): Thieves' Cant + one language of your choice ---
  thieves-cant:
    choices:
      - kind: select-proficiency
        id: languages
        domain: language
        count: 1

  # --- Warlock Eldritch Invocations (L1): one invocation of your choice ---
  # deferred: scaling invocation counts at higher levels (3 at L2, etc.)
  eldritch-invocations:
    choices:
      - kind: select-entity
        id: invocation
        count: 1
        entity_type: optional-feature
        where: { feature_type: invocation, available_to: self }
  # Pact Boon: in 2024 there is no distinct pact-boon decision feature -- the
  # former pact boons are Eldritch Invocations (e.g. Pact of the Tome), chosen
  # through Eldritch Invocations above. No separate choice is authored.

  # --- Sorcerer Metamagic (L2; +2 at L10 and L17, scaling deferred) ---
  sorcerer:metamagic:
    choices:
      - kind: select-entity
        id: metamagic
        count: 2
        entity_type: optional-feature
        where: { feature_type: metamagic, available_to: self }

  # --- Cleric Divine Order (L1): one sacred role (flavor pick) ---
  # No FeatureEffect kind covers weapon/armor training or extra cantrips, so
  # options carry descriptions only.
  divine-order:
    choices:
      - kind: select-inline
        id: divine-order
        count: 1
        options:
          - value: protector
            label: Protector
            description: Trained for battle, you gain proficiency with Martial weapons and training with Heavy armor.
          - value: thaumaturge
            label: Thaumaturge
            description: You know one extra cantrip from the Cleric spell list, and gain a bonus to Intelligence (Arcana or Religion) checks equal to your Wisdom modifier (minimum +1).

  # --- Druid Primal Order (L1): one sacred role (flavor pick) ---
  primal-order:
    choices:
      - kind: select-inline
        id: primal-order
        count: 1
        options:
          - value: magician
            label: Magician
            description: You know one extra cantrip from the Druid spell list, and gain a bonus to Intelligence (Arcana or Nature) checks equal to your Wisdom modifier (minimum +1).
          - value: warden
            label: Warden
            description: Trained for battle, you gain proficiency with Martial weapons and training with Medium armor.

  # --- Cleric Blessed Strikes (L7): one combat boon (flavor pick) ---
  blessed-strikes:
    choices:
      - kind: select-inline
        id: blessed-strikes
        count: 1
        options:
          - value: divine-strike
            label: Divine Strike
            description: Once on each of your turns when you hit with a weapon, deal an extra 1d8 Necrotic or Radiant damage (your choice).
          - value: potent-spellcasting
            label: Potent Spellcasting
            description: Add your Wisdom modifier to the damage you deal with any Cleric cantrip.

  # --- Druid Elemental Fury (L7): one elemental boon (flavor pick) ---
  elemental-fury:
    choices:
      - kind: select-inline
        id: elemental-fury
        count: 1
        options:
          - value: potent-spellcasting
            label: Potent Spellcasting
            description: Add your Wisdom modifier to the damage you deal with any Druid cantrip.
          - value: primal-strike
            label: Primal Strike
            description: Once on each of your turns when you hit with a weapon or a Wild Shape Beast attack, deal an extra 1d8 Cold, Fire, Lightning, or Thunder damage.

  # --- Spellcasting / prepared-spell features (no build-time choice here) ---
  spellcasting:
    noChoices: true # deferred: spell management lives on the sheet (SP4c)
  pact-magic:
    noChoices: true # deferred: spell management lives on the sheet (SP4c)
  mystic-arcanum:
    noChoices: true # deferred: spell management lives on the sheet (SP4c)
  # Monk Empowered Strikes (L6): per-attack damage-type swap, resolved in play,
  # not a build-time decision.
  empowered-strikes:
    noChoices: true # per-attack runtime choice, not a build decision
  # Barbarian Brutal Strike (L9): forgo-Advantage + effect pick made per attack.
  brutal-strike:
    noChoices: true # per-attack runtime choice, not a build decision
  # Druid Archdruid (L20): Wild Shape uses -> spell slot conversion happens in
  # play ("Choose a number of your unexpended uses...").
  archdruid:
    noChoices: true # in-play resource conversion, not a build decision
  # Monk Heightened Focus (L10): the Step of the Wind "choose a willing
  # creature" rider is an in-play target pick.
  heightened-focus:
    noChoices: true # in-play target pick, not a build decision

  # --- Subclass features (subclass-merge reads the class_features overlay map) ---
  # Fiend Patron (Warlock) -- Dark One's Own Luck
  dark-ones-own-luck:
    resources:
      - id: "fiend-patron:dark-ones-own-luck"
        name: Dark One's Own Luck
        max_formula: "{cha_mod}"
        reset: short-rest
  # Warrior of the Open Hand (Monk) -- Wholeness of Body
  wholeness-of-body:
    action_cost: bonus-action
    resources:
      - id: "warrior-of-the-open-hand:wholeness-of-body"
        name: Wholeness of Body
        max_formula: "{wis_mod}"
        reset: long-rest

  # ===================================================================
  # Subclass decision data (SP2 Plan 3). Scoped keys
  # `<subclass-bare-slug>:<feature-slug>` so they land on the subclass's
  # features only. Feature slugs are slugifyName(feature.name). Every 2024
  # subclass was walked; only the features below carry a build-time choice.
  # ===================================================================

  # --- Champion (Fighter) -- Additional Fighting Style (L7) ---
  # "another Fighting Style feat of your choice." Same select-entity as the
  # base Fighting Style. Registry gap: no fighting_style optional-features ship
  # in optional-feature.2024.json (only `invocation`), so the WHERE filter
  # currently resolves to an empty set -- the data-driven query is correct and
  # will populate once the registry is backfilled (mirrors Task 8's note).
  champion:additional-fighting-style:
    choices:
      - kind: select-entity
        id: fighting-style
        count: 1
        entity_type: optional-feature
        where: { feature_type: fighting_style, available_to: self }

  # --- College of Lore (Bard) -- Bonus Proficiencies (L3) ---
  # "proficiency with three skills of your choice."
  college-of-lore:bonus-proficiencies:
    choices:
      - kind: select-proficiency
        id: skills
        domain: skill
        count: 3

  # --- Draconic Sorcery (Sorcerer) -- Elemental Affinity (L6) ---
  # "Choose one of those types: Acid, Cold, Fire, Lightning, or Poison." You
  # gain Resistance to the chosen type (the CHA-to-damage rider is not an
  # expressible effect, so it lives in option descriptions only).
  draconic-sorcery:elemental-affinity:
    choices:
      - kind: select-inline
        id: elemental-affinity
        count: 1
        options:
          - value: acid
            label: Acid
            effects: [{ kind: resistance, damage_type: Acid }]
          - value: cold
            label: Cold
            effects: [{ kind: resistance, damage_type: Cold }]
          - value: fire
            label: Fire
            effects: [{ kind: resistance, damage_type: Fire }]
          - value: lightning
            label: Lightning
            effects: [{ kind: resistance, damage_type: Lightning }]
          - value: poison
            label: Poison
            effects: [{ kind: resistance, damage_type: Poison }]

  # --- Hunter (Ranger) -- Hunter's Prey (L3) ---
  # "You gain one of the following feature options of your choice." Replaceable
  # each rest, but the initial pick is a build decision.
  hunter:hunters-prey:
    choices:
      - kind: select-inline
        id: hunters-prey
        count: 1
        options:
          - value: colossus-slayer
            label: Colossus Slayer
            description: When you hit a creature with a weapon, the weapon deals an extra 1d8 damage to the target if it's missing any of its Hit Points (once per turn).
          - value: horde-breaker
            label: Horde Breaker
            description: Once on each of your turns when you make an attack with a weapon, you can make another attack with the same weapon against a different creature within 5 feet of the original target and within range.

  # --- Hunter (Ranger) -- Defensive Tactics (L7) ---
  hunter:defensive-tactics:
    choices:
      - kind: select-inline
        id: defensive-tactics
        count: 1
        options:
          - value: escape-the-horde
            label: Escape the Horde
            description: Opportunity Attacks have Disadvantage against you.
          - value: multiattack-defense
            label: Multiattack Defense
            description: When a creature hits you with an attack roll, that creature has Disadvantage on all other attack rolls against you this turn.

  # --- Subclass features with deferred / runtime-only decisions ---
  # Circle of the Land (Druid) -- Circle of the Land Spells: "Whenever you
  # finish a Long Rest, choose one type of land (arid/polar/temperate/tropical)"
  # is a recurring runtime choice (re-picked each rest), not a build decision.
  circle-of-the-land:circle-of-the-land-spells:
    noChoices: true # recurring per-long-rest land pick, not a build decision
  # College of Lore (Bard) -- Magical Discoveries: "two spells of your choice"
  # from the Cleric/Druid/Wizard lists -- spell management (SP4c deferral).
  college-of-lore:magical-discoveries:
    noChoices: true # deferred: spell management lives on the sheet (SP4c)
  # Evoker (Wizard) -- Evocation Savant: "Choose two Wizard spells from the
  # Evocation school" added to the spellbook -- spell management (SP4c).
  evoker:evocation-savant:
    noChoices: true # deferred: spell management lives on the sheet (SP4c)
  # Fiend Patron (Warlock) -- Fiendish Resilience: "Choose one damage type...
  # whenever you finish a Short or Long Rest" -- recurring runtime choice.
  fiend-patron:fiendish-resilience:
    noChoices: true # recurring per-rest damage-type pick, not a build decision
  # Expanded prepared-spell lists (always-prepared subclass spell tables) carry
  # no player choice -- listed for coverage completeness (SP4c spell mgmt).
  draconic-sorcery:draconic-spells:
    noChoices: true # always-prepared subclass spell table, no choice
  fiend-patron:fiend-spells:
    noChoices: true # always-prepared subclass spell table, no choice
  life-domain:life-domain-spells:
    noChoices: true # always-prepared subclass spell table, no choice
  oath-of-devotion:oath-of-devotion-spells:
    noChoices: true # always-prepared subclass spell table, no choice
  # Warrior of the Open Hand (Monk) -- Open Hand Technique: per-attack effect
  # pick (Addle/Push/Topple) resolved in play, not a build decision.
  warrior-of-the-open-hand:open-hand-technique:
    noChoices: true # per-attack runtime choice, not a build decision
  # Circle of the Land (Druid) -- Land's Aid (L3): point + affected-creature
  # picks made each use, in play.
  circle-of-the-land:lands-aid:
    noChoices: true # in-play target pick, not a build decision
  # Evoker (Wizard) -- Sculpt Spells (L6): spared-creature picks made per cast.
  evoker:sculpt-spells:
    noChoices: true # per-cast runtime choice, not a build decision
  # Path of the Berserker (Barbarian) -- Intimidating Presence (L14): affected
  # creatures are picked each use, in play.
  path-of-the-berserker:intimidating-presence:
    noChoices: true # in-play target pick, not a build decision

# ===================================================================
# Entity-level class overrides (SP2 Plan 3). Keyed by bare class slug.
# skill_choices + starting_equipment transcribed from each class's Core Traits
# table; the prose parser falls back to all-18 skills / empty equipment for
# every 2024 class, so these are authored. subclass_feature_name overrides the
# generic "Subclass" default with the class-specific name. subclass_level is 3
# for every 2024 class (== default), so no override is authored.
# ===================================================================
classes:
  barbarian:
    subclass_feature_name: Barbarian Subclass
    skill_choices:
      count: 2
      from: [animal-handling, athletics, intimidation, nature, perception, survival]
    starting_equipment:
      - kind: choice
        options:
          - label: "Greataxe, 4 Handaxes, Explorer's Pack, and 15 GP"
            grants:
              - { item: greataxe }
              - { item: handaxe, qty: 4 }
              - { gold: 15 }
          - label: "75 GP"
            grants: [{ gold: 75 }]
    starting_gold: { fixed: 75 }
  bard:
    spellcasting:
      caster_type: full
      ability: cha
      preparation: prepared
      spell_list: bard
    subclass_feature_name: Bard Subclass
    skill_choices:
      count: 3
      from: [acrobatics, animal-handling, arcana, athletics, deception, history, insight, intimidation, investigation, medicine, nature, perception, performance, persuasion, religion, sleight-of-hand, stealth, survival]
    starting_equipment:
      - kind: choice
        options:
          - label: "Leather Armor, 2 Daggers, Musical Instrument of your choice, Entertainer's Pack, and 19 GP"
            grants:
              - { item: leather-armor }
              - { item: dagger, qty: 2 }
              - { gold: 19 }
          - label: "90 GP"
            grants: [{ gold: 90 }]
    starting_gold: { fixed: 90 }
  cleric:
    spellcasting:
